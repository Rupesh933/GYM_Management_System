{% extends 'base.html' %} 
{% load static %}
{% block content %}

<link
  href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css"
  rel="stylesheet"
/>
<link
  href="https://cdn.jsdelivr.net/npm/select2-bootstrap-5-theme@1.2.0/dist/select2-bootstrap-5-theme.min.css"
  rel="stylesheet"
/>

<h2 class="mb-4">
  {% if mode == 'add' %} Add Workout / Diet Plan {% else %} Edit Workout / Diet Plan {% endif %}
</h2>

<form method="POST" class="row g-3 w-75">
  {% csrf_token %}

  <div class="col-md-6">
    <label class="form-label">Member</label>
    <select name="member_id" class="form-select" required>
      <option value="">-- Select Member --</option>
      {% for member in members %}
        <option value="{{ member.id }}"
          {% if workout_plan and workout_plan.member.id == member.id %}selected{% endif %}>
          {{ member.full_name }}
        </option>
      {% endfor %}
    </select>
  </div>

  <div class="col-md-6">
    <label class="form-label">Title</label>
    <input
      type="text"
      class="form-control"
      name="title"
      value="{{ workout_plan.title|default:'' }}"
      required
    />
  </div>

  <div class="col-md-12">
    <label class="form-label">Description</label>
    <textarea
      name="description"
      class="form-control"
      rows="5"
      required
    >{{ workout_plan.description|default:'' }}</textarea>
  </div>

  <div class="col-md-12">
    <button type="submit" class="btn btn-primary">
      {% if mode == 'add' %} Add Workout / Diet Plan {% else %} Update Workout / Diet Plan {% endif %}
    </button>

    <a href="{% url 'admin_workout_plan_list' %}" class="btn btn-secondary">
      Cancel
    </a>
  </div>
</form>

{% endblock %}
