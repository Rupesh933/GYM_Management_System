{% extends 'base.html' %}

{% block content %}

<div class="row">
    <div class="col-md-7">
        <h1 class="mb-3">Welcome to the My GYM</h1>
        <p>Simple GYM Management Systme build using Django, HTML, CSS, Bootstrap, JavaScript, SQLite, Python</p>
        <p>Manage members, Equipment, Attendance and more.</p>
    </div>
    <div class="col-md-5">
        <div class="md-md-5">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">Contact / Enquiry</div>
            </div>
            <div class="card-body">
                <form method="post" action="{% url 'home' %}">
                    {% csrf_token %}
                    <div class="mb-2">
                        <label for="name" class="form-label">Name: </label>
                        <input type="text" class="form-control" id="name" name="name" required />
                    </div>
                    <div class="mb-2">
                        <label for="email" class="form-label">Email: </label>
                        <input type="email" class="form-control" id="email" name="email" required />
                    </div>
                    <div class="mb-2">
                        <label for="mobile" class="form-label">Mobile: </label>
                        <input type="tel" class="form-control" id="mobile" name="mobile" maxlength="10" pattern="[0-9]{10}" required/>
                    </div>
                    <div class="mb-2">
                        <label for="message" class="form-label">Mobile: </label>
                        <textarea class="form-control" id="message" name="message" rows="3" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Submit Enquiry</button>
                </form>
            </div>
        </div>
    </div>
</div>

{% endblock content %}
