{% extends 'base.html' %}
{% block content %}

<div class="d-flex justify-content-between align-item-center mb-3">
    <h2 class="">Payments </h2>
    <a href="{% url 'admin_workout_plans_add' %}" class="btn btn-primary">Add Payment</a>
</div>

<form method="get" class="row g-2 mb-3">
    <div class="col-md-4">
        <select name="member_id" class="form-select">
            <option value="">-- All Member --</option>

            {% for member in members %}
                <option value="{{ member.id }}"
                {% if member.id|stringformat:"s" == selected_member_id %}selected{% endif %}>
                    {{ member.full_name }}
                </option>
            {% endfor %}
        </select>
    </div>
    <div class="col-md-4">
        <select name="status" id="">
            option value="">-- All Status --</option>
            <option value="Pending" {% if selected_status == "Pending" %}selected{% endif %}>Pending</option>
            <option value="Completed" {% if selected_status == "Completed" %}selected{% endif %}>Completed</option>
            <option value="Failed" {% if selected_status == "Failed" %}selected{% endif %}>Failed</option>
        </select>
    </div>
    <div class="col-md-3">
        <button type="submit" class="btn btn-secondary w-100">Filter</button>
    </div>
</form>

<div class="row g-3">
    {% for payment in payments %}
        <div class="col-md-6">
            <div class="card shadow-sm">

                <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                    <span>Title: {{ payment.title }}</span>
                    <small>Member: {{ payment.member.full_name }}</small>  <!-- Display member name in header -->
                </div>

                <div class="card-body">
                    <p class="small text-muted mb-1">
                        {{ payment.created_at|date:"d M Y" }}
                    </p>

                    <textarea
                        class="form-control auto-resize"
                        name="description"
                    >{{ payment.description|default:"No description provided." }}</textarea>

                    <form method="post" action="{% url 'admin_workout_plan_delete' wp.id %}">
                        {% csrf_token %}

                        <a href="{% url 'admin_workout_plan_edit' wp.id %}" class="btn btn-sm btn-primary mt-3">
                            Edit
                        </a>
                        <button type="submit" class="btn btn-sm btn-danger mt-3">
                            Delete
                        </button>
                    </form>
                </div>

            </div>
        </div>
    {% endfor %}
</div>

<script>
document.querySelectorAll('.auto-resize').forEach(textarea => {
    textarea.style.height = textarea.scrollHeight + 'px';

    textarea.addEventListener('input', () => {
        textarea.style.height = 'auto';
        textarea.style.height = textarea.scrollHeight + 'px';
    });
});
</script>

{% endblock %}
