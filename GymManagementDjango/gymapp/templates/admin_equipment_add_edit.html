{% extends 'base.html' %} 
{% load static %}
{% block content %}

<link
  href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css"
  rel="stylesheet"
/>
<link
  href="https://cdn.jsdelivr.net/npm/select2-bootstrap-5-theme@1.2.0/dist/select2-bootstrap-5-theme.min.css"
  rel="stylesheet"
/>

<h2 class="mb-4">
  {% if mode == 'add' %} Add Equipment {% else %} Edit Equipment {% endif %}
</h2>

<form method="POST" class="row g-3 w-75">
  {% csrf_token %}

  <!-- NAME -->
  <div class="col-md-6">
    <label class="form-label"> Name </label>
    <input
      type="text"
      class="form-control"
      name="name"
      value="{{ equipment.name|default:'' }}"
      required
    />
  </div>
    <!-- UNITS -->
  <div class="col-md-6">
    <label class="form-label"> Units </label>
    <input
      type="number"
      class="form-control"
      name="units"
      value="{{ equipment.units|default:'' }}"
      required
    />
  </div>
  <!-- PRICE -->
  <div class="col-md-6">
    <label class="form-label"> Price </label>

    <input
      type="number"
      step="0.01"
      class="form-control"
      name="price"
      value="{{ equipment.price|default:'' }}"
      required
    />
  </div>

  <!-- DATE -->
  <div class="col-md-6">
    <label class="form-label"> Purchase Date </label>

    <input
      type="date"
      class="form-control"
      name="purchase_date"
      value="{{ equipment.purchase_date|date:'Y-m-d' }}"
      required
    />
  </div>


  <!-- BUTTONS -->
  <div class="col-md-12">
    <button type="submit" class="btn btn-primary">
      {% if mode == 'add' %} Add Equipment {% else %} Update Equipment {% endif %}
    </button>

    <a href="{% url 'admin_equipment_list' %}" class="btn btn-secondary">
      Cancel
    </a>
  </div>
</form>

{% endblock %}
